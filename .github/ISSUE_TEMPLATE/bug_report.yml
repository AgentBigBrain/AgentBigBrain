name: Bug report
description: Report a reproducible bug
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Include exact commands and inputs.
      placeholder: "1. Run `npm run dev -- \"...\"`\n2. Observe ..."
    validations:
      required: true

  - type: textarea
    id: expected_actual
    attributes:
      label: Expected vs actual behavior
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, and relevant env toggles.

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Redact secrets before submitting.
