name: Feature request
description: Propose a feature or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: User impact
      description: Who benefits and how?

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
